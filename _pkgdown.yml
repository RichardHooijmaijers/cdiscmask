url: https://richardhooijmaijers.github.io/cdiscmask/
template:
  bootstrap: 5
  light-switch: yes
  bslib:
    bg: '#fbfaf6'
    fg: '#15110a'
    primary: '#e9663b'
    navbar-bg: '#0f3d3e'
    navbar-color: '#f6f1e7'
    base_font:
      google: Inter
    heading_font:
      google: Inter
    code_font:
      google:
        family: JetBrains Mono
        wght: 400;500;700
    border-radius: 4px
    border-color: rgba(21,17,10,0.12)
    headings-font-weight: 700
  opengraph:
    image:
      src: og-image.png
      alt: cdiscmask — anonymise CDISC clinical-trial data
navbar:
  bg: dark
  structure:
    left:
    - intro
    - reference
    - articles
    - news
    right:
    - search
    - github
    - lightswitch
  components:
    intro:
      text: Get started
      href: articles/cdiscmask-intro.html
home:
  title: cdiscmask · Anonymise CDISC clinical-trial data
  description: |
    Mask subject identifiers, shift dates, and redact free-text in SDTM and ADaM datasets — so you can share, present, or test against real-looking data without exposing real subjects.
  sidebar:
    structure:
    - links
    - license
    - community
    - citation
    - authors
    - dev
  links:
  - text: Browse source code
    href: https://github.com/RichardHooijmaijers/cdiscmask
  - text: Report a bug
    href: https://github.com/RichardHooijmaijers/cdiscmask/issues
reference:
- title: Subject identifiers
  desc: |
    Mask or pseudonymise USUBJID and other subject-level keys. Mappings can be persisted for reproducible re-runs.
  contents: mask_subject_id
- title: Date shifting
  desc: |
    Apply per-subject date offsets so intervals are preserved while absolute dates are scrambled.
  contents: shift_dates
- title: Free-text redaction
  desc: |
    Scrub comments, AE verbatim terms, and other free-text fields.
  contents: mask_free_text
- title: Pipeline helpers
  desc: Convenience wrappers for masking a whole study at once.
  contents:
  - mask_cdisc
  - mask_domain
  - unmask_domain
  - detect_sensitive_cols
  - new_mask_key
  - save_mask_key
  - load_mask_key
articles:
- title: Get started
  navbar: ~
  contents: cdiscmask-intro
news:
  releases:
  - text: Release notes
    href: https://github.com/RichardHooijmaijers/cdiscmask/blob/main/NEWS.md
development:
  mode: auto
authors:
  Richard Hooijmaijers:
    href: https://github.com/RichardHooijmaijers

